version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Vue 3 (Composition API with script setup)
  - Tauri 2 (Rust backend, desktop app)
  - CoreUI + Bootstrap 5 (UI framework)
  - Pinia (state management)
  - Tiptap (WYSIWYG editor)
  - vee-validate (form validation)
  - vue-i18n (internationalization es/en)
  - SortableJS (drag and drop)
  - splitpanes (resizable panels)
routes:
  - path: /
    file: src/App.vue
    auth_required: true
    description: Unlock view - password entry to decrypt vault
  - path: /main
    file: src/views/MainView.vue
    auth_required: true
    description: Main 3-column layout with notebook tree, note list, and editor
  - path: /settings
    file: src/views/SettingsView.vue
    auth_required: true
    description: Settings page with sync configuration (filesystem, WebDAV, Nextcloud)
features:
  - name: Vault Unlock
    description: Enter master password to decrypt the vault and access notes
    files:
      - src/views/UnlockView.vue
      - src/stores/appStore.ts
    entry_route: /
    user_interactions:
      - Type master password in password input
      - Click unlock button or press Enter
      - See error message on wrong password
      - Click create vault link to set up a new vault
      - Type new password and confirm password
      - Click create button to create vault
    api_calls:
      - method: INVOKE
        endpoint: vault_status
      - method: INVOKE
        endpoint: vault_unlock
      - method: INVOKE
        endpoint: vault_create
    auth_required: false
  - name: Notebook Tree Navigation
    description: Hierarchical notebook tree with create, rename, delete, drag-and-drop reorder
    files:
      - src/components/sidebar/NotebookTree.vue
      - src/components/sidebar/NotebookTreeItem.vue
      - src/components/sidebar/SidebarActions.vue
      - src/stores/notebookStore.ts
    entry_route: /main
    user_interactions:
      - Click notebook to select it and show its notes
      - Click add button to create new notebook
      - Right-click notebook for context menu (rename, delete, create child)
      - Drag notebook to reorder or move to new parent
      - Expand/collapse notebook children with chevron
    api_calls:
      - method: INVOKE
        endpoint: notebooks_list
      - method: INVOKE
        endpoint: notebook_create
      - method: INVOKE
        endpoint: notebook_update
      - method: INVOKE
        endpoint: notebook_delete
    auth_required: true
  - name: Note List
    description: List of notes in selected notebook with sort, create, delete, pin functionality
    files:
      - src/components/notelist/NoteList.vue
      - src/components/notelist/NoteListItem.vue
      - src/stores/noteStore.ts
    entry_route: /main
    user_interactions:
      - Click note to select and open in editor
      - Click add button to create new note
      - Right-click note for context menu (rename, delete, pin/unpin, move)
      - Drag note to reorder
      - See pinned notes at top of list
    api_calls:
      - method: INVOKE
        endpoint: notes_list
      - method: INVOKE
        endpoint: note_create
      - method: INVOKE
        endpoint: note_update
      - method: INVOKE
        endpoint: note_delete
      - method: INVOKE
        endpoint: note_set_sort_order
    auth_required: true
  - name: Rich Text Editor
    description: Tiptap-based WYSIWYG editor with formatting toolbar, auto-save, image support
    files:
      - src/components/editor/NoteEditor.vue
      - src/components/editor/ImageNodeView.vue
      - src/composables/useAutoSave.ts
    entry_route: /main
    user_interactions:
      - Type note content in the editor area
      - Use toolbar buttons for formatting (bold, italic, headings, lists, etc.)
      - Paste or drag images into editor
      - Toggle spell check on/off
      - Right-click for context menu (cut, copy, paste, spell check, read aloud)
      - See auto-save indicator (Saved, Saving..., Unsaved)
    api_calls:
      - method: INVOKE
        endpoint: note_get
      - method: INVOKE
        endpoint: note_update
      - method: INVOKE
        endpoint: attachment_save
      - method: INVOKE
        endpoint: attachment_get
    auth_required: true
  - name: Full-text Search
    description: Search notes by title and content with fuzzy matching
    files:
      - src/components/search/SearchModal.vue
    entry_route: /main
    user_interactions:
      - Click search icon or press keyboard shortcut to open search modal
      - Type search query in input field
      - Click search result to navigate to note
    api_calls:
      - method: INVOKE
        endpoint: search_notes
    auth_required: true
  - name: Sync Configuration
    description: Configure sync provider (filesystem, WebDAV, Nextcloud) and run manual/auto sync
    files:
      - src/views/SettingsView.vue
      - src/stores/syncStore.ts
    entry_route: /settings
    user_interactions:
      - Select sync provider (filesystem, WebDAV, Nextcloud)
      - Enter filesystem path or WebDAV/Nextcloud credentials
      - Click test connection button for WebDAV/Nextcloud
      - Click save to store sync configuration
      - Click sync now to run manual sync
      - Configure auto-sync interval
    api_calls:
      - method: INVOKE
        endpoint: sync_configure
      - method: INVOKE
        endpoint: sync_get_config
      - method: INVOKE
        endpoint: sync_run
      - method: INVOKE
        endpoint: sync_webdav_test
    auth_required: true
  - name: Trash / Soft Delete
    description: Deleted notes and notebooks go to trash with restore and permanent delete
    files:
      - src/components/modals/TrashModal.vue
    entry_route: /main
    user_interactions:
      - Open trash modal from sidebar
      - View trashed items
      - Click restore to recover item
      - Click permanent delete to remove forever
    api_calls:
      - method: INVOKE
        endpoint: trash_list
      - method: INVOKE
        endpoint: trash_restore
      - method: INVOKE
        endpoint: trash_delete_permanent
    auth_required: true
  - name: Quick Create Note
    description: Modal to quickly create a note from anywhere with keyboard shortcut
    files:
      - src/components/modals/QuickCreateModal.vue
    entry_route: /main
    user_interactions:
      - Open quick create modal with keyboard shortcut
      - Type note title and optional content
      - Select target notebook
      - Click create to add note
    api_calls:
      - method: INVOKE
        endpoint: note_create
      - method: INVOKE
        endpoint: notebooks_list
    auth_required: true
known_limitations:
  - issue: App requires Tauri runtime for backend commands (invoke calls). In a browser-only context, all Tauri API calls will fail.
    location: src/services/api.ts
    impact: Tests in browser will only validate UI rendering and component structure, not full data flows
  - issue: No vue-router - view switching is handled by Pinia state (currentView)
    location: src/App.vue
    impact: Routes are not URL-based, navigation depends on app state
  - issue: i18n default locale is Spanish
    location: src/i18n/i18n.ts
    impact: UI text will appear in Spanish by default
